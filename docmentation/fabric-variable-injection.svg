<svg width="680" viewBox="0 0 680 590" xmlns="http://www.w3.org/2000/svg" style="background:#fff;font-family:-apple-system,'Segoe UI',Helvetica,Arial,sans-serif">
<defs>
  <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    .th{font-size:13px;font-weight:600}
    .ts{font-size:11px;font-weight:400}
  </style>
</defs>

<!-- Title -->
<text class="th" x="340" y="28" text-anchor="middle" fill="#2C2C2A">Variable library injection</text>
<text class="ts" x="340" y="46" text-anchor="middle" fill="#5F5E5A">GitHub variables → script → variables.json → Fabric workspace → notebooks</text>

<!-- Section label -->
<text class="ts" x="340" y="65" text-anchor="middle" fill="#888780">GitHub repository variables</text>

<!-- ROW 1: Three variable boxes -->
<rect x="32" y="72" width="186" height="52" rx="6" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
<text class="th" x="125" y="91" text-anchor="middle" dominant-baseline="central" fill="#085041">Dev variables</text>
<text class="ts" x="125" y="110" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">ENV_VAR_DEV_LakehouseUrl</text>

<rect x="247" y="72" width="186" height="52" rx="6" fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.5"/>
<text class="th" x="340" y="91" text-anchor="middle" dominant-baseline="central" fill="#3C3489">Test variables</text>
<text class="ts" x="340" y="110" text-anchor="middle" dominant-baseline="central" fill="#534AB7">ENV_VAR_TEST_LakehouseUrl</text>

<rect x="462" y="72" width="186" height="52" rx="6" fill="#FAECE7" stroke="#D85A30" stroke-width="0.5"/>
<text class="th" x="555" y="91" text-anchor="middle" dominant-baseline="central" fill="#712B13">Prod variables</text>
<text class="ts" x="555" y="110" text-anchor="middle" dominant-baseline="central" fill="#993C1D">ENV_VAR_PROD_LakehouseUrl</text>

<!-- Converge arrows -->
<line x1="125" y1="124" x2="125" y2="148" stroke="#1D9E75" stroke-width="1.2" marker-end="url(#arr)"/>
<line x1="340" y1="124" x2="340" y2="148" stroke="#7F77DD" stroke-width="1.2" marker-end="url(#arr)"/>
<line x1="555" y1="124" x2="555" y2="148" stroke="#D85A30" stroke-width="1.2" marker-end="url(#arr)"/>

<!-- ROW 2: Script box -->
<rect x="170" y="148" width="340" height="64" rx="6" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
<text class="th" x="340" y="170" text-anchor="middle" dominant-baseline="central" fill="#2C2C2A">update_variables.sh</text>
<text class="ts" x="340" y="191" text-anchor="middle" dominant-baseline="central" fill="#5F5E5A">Reads vars by prefix · strips prefix · writes JSON</text>

<!-- Arrow down -->
<line x1="340" y1="212" x2="340" y2="238" stroke="#888780" stroke-width="1.2" marker-end="url(#arr)"/>

<!-- ROW 3: variables.json -->
<rect x="130" y="238" width="420" height="80" rx="6" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
<text class="th" x="340" y="262" text-anchor="middle" dominant-baseline="central" fill="#2C2C2A">variable_template.VariableLibrary/variables.json</text>
<text class="ts" x="340" y="283" text-anchor="middle" dominant-baseline="central" fill="#5F5E5A">{ "name": "LakehouseUrl", "type": "String",</text>
<text class="ts" x="340" y="302" text-anchor="middle" dominant-baseline="central" fill="#5F5E5A">"value": "dev-lakehouse.dfs.core.windows.net" }</text>

<!-- Committed to branch side note -->
<text class="ts" x="566" y="262" fill="#888780">committed to</text>
<text class="ts" x="566" y="278" fill="#888780">branch via GH_PAT</text>

<!-- Arrow down -->
<line x1="340" y1="318" x2="340" y2="344" stroke="#888780" stroke-width="1.2" marker-end="url(#arr)"/>

<!-- ROW 4: Git sync -->
<rect x="190" y="344" width="300" height="52" rx="6" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
<text class="th" x="340" y="364" text-anchor="middle" dominant-baseline="central" fill="#085041">Fabric Git sync</text>
<text class="ts" x="340" y="383" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">UpdateFromGit pulls variables.json into workspace</text>

<!-- Arrow down -->
<line x1="340" y1="396" x2="340" y2="422" stroke="#1D9E75" stroke-width="1.2" marker-end="url(#arr)"/>

<!-- ROW 5: VariableLibrary -->
<rect x="180" y="422" width="320" height="52" rx="6" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.8"/>
<text class="th" x="340" y="442" text-anchor="middle" dominant-baseline="central" fill="#085041">Fabric VariableLibrary item</text>
<text class="ts" x="340" y="461" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">LakehouseUrl resolved for this environment</text>

<!-- Fan out arrows to consumers -->
<path d="M280 474 L200 474 L200 514" fill="none" stroke="#1D9E75" stroke-width="1.2" marker-end="url(#arr)"/>
<path d="M400 474 L480 474 L480 514" fill="none" stroke="#1D9E75" stroke-width="1.2" marker-end="url(#arr)"/>

<!-- ROW 6: Consumers -->
<rect x="110" y="514" width="180" height="52" rx="6" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
<text class="th" x="200" y="534" text-anchor="middle" dominant-baseline="central" fill="#2C2C2A">Notebook</text>
<text class="ts" x="200" y="553" text-anchor="middle" dominant-baseline="central" fill="#5F5E5A">references LakehouseUrl</text>

<rect x="390" y="514" width="180" height="52" rx="6" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
<text class="th" x="480" y="534" text-anchor="middle" dominant-baseline="central" fill="#2C2C2A">Data pipeline</text>
<text class="ts" x="480" y="553" text-anchor="middle" dominant-baseline="central" fill="#5F5E5A">references LakehouseUrl</text>

<!-- Footer note -->
<text class="ts" x="340" y="582" text-anchor="middle" fill="#888780">Notebooks are environment-agnostic · the correct value is injected at deploy time</text>

